name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v0.2.0"
        required: true
        type: string
      release_notes:
        description: "Fallback release notes when .github/release-notes/<tag>.md is not present"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Opus (for audiopus_sys)
        # Apple Silicon-only build: install a native arm64 libopus so audiopus_sys
        # links it via pkg-config instead of compiling Opus from source. (Building
        # Opus from source does NOT cross-compile cleanly, which is why the universal
        # build's x86_64 slice failed to link `_opus_decode` &c.) autotools is kept as
        # a fallback in case the source path is taken anyway; Homebrew names libtoolize
        # `glibtoolize` (libtool is keg-only on macOS), so expose it under that name.
        run: |
          set -euxo pipefail
          brew install opus pkg-config autoconf automake libtool
          ln -sf "$(brew --prefix libtool)/bin/glibtoolize" "$(brew --prefix)/bin/libtoolize"

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            fallback_notes="${{ inputs.release_notes }}"
          else
            tag="${GITHUB_REF_NAME}"
            fallback_notes=""
          fi

          notes_file=".github/release-notes/${tag}.md"
          body_file="${RUNNER_TEMP}/release-body.md"

          if [[ -f "${notes_file}" ]]; then
            cp "${notes_file}" "${body_file}"
          elif [[ -n "${fallback_notes}" ]]; then
            printf '%s\n' "${fallback_notes}" > "${body_file}"
          else
            printf 'Release %s\n' "${tag}" > "${body_file}"
          fi

          {
            echo "tag=${tag}"
            echo "body<<EOF"
            cat "${body_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Fetch ONNX Runtime (universal2) for speaker diarization
        # Downloads libonnxruntime.dylib into src-tauri/onnxruntime/ so tauri.conf
        # bundles + codesigns it. Loaded at runtime via ORT_DYLIB_PATH (not linked).
        run: bash src-tauri/scripts/fetch-onnxruntime.sh

      - name: Import Apple signing certificate
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="${{ runner.temp }}/certificate.p12"
          KEYCHAIN_PATH="${{ runner.temp }}/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Prepare Apple API Key
        if: ${{ env.APPLE_API_KEY_CONTENT != '' }}
        run: |
          mkdir -p "${{ runner.temp }}/private_keys"
          echo "$APPLE_API_KEY_CONTENT" > "${{ runner.temp }}/private_keys/AuthKey_${{ env.APPLE_API_KEY }}.p8"
          echo "APPLE_API_KEY_PATH=${{ runner.temp }}/private_keys/AuthKey_${{ env.APPLE_API_KEY }}.p8" >> $GITHUB_ENV

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The GitHub release is the LOCAL-ONLY OSS edition — no account/sync code.
          VITE_PARLEY_CLOUD: "false"
          # Updater artifact signing (minisign) — lets the app verify auto-updates
          # against the pubkey in tauri.conf.json. tauri-action signs the bundle and
          # attaches `latest.json` to the release when these are present.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "Parley ${{ steps.release.outputs.tag }}"
          releaseBody: ${{ steps.release.outputs.body }}
          releaseDraft: false
          prerelease: false
          tauriScript: bun run tauri
          args: --target aarch64-apple-darwin
          releaseAssetNamePattern: "[name]-[version]-[platform]-[arch].[ext]"

      # ── Cloud edition ──────────────────────────────────────────────────────────
      # The OSS release above is already published to GitHub. Now build the CLOUD
      # edition (account/sync/orgs compiled in, updater pointed at the website feed)
      # and push it to R2 under `downloads/`, where the parley-cloud Worker's
      # /download route serves it to the marketing site + the cloud app's updater.
      # These steps run AFTER the GitHub release, so a cloud-upload failure never
      # blocks the OSS release.
      - name: Build cloud edition
        env:
          VITE_PARLEY_CLOUD: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri build --config src-tauri/tauri.conf.cloud.json --target aarch64-apple-darwin

      - name: Upload cloud edition to R2 (website download + updater feed)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euxo pipefail
          BUNDLE="src-tauri/target/aarch64-apple-darwin/release/bundle"
          TARGZ="${BUNDLE}/macos/Parley.app.tar.gz"
          DMG="$(ls "${BUNDLE}"/dmg/Parley_*_aarch64.dmg | head -1)"
          VERSION="${{ steps.release.outputs.tag }}"; VERSION="${VERSION#v}"
          # Build the updater feed (latest.json) — signature is the .sig file, url
          # points at the Worker download route (which streams the .app.tar.gz from R2).
          SIG_FILE="${TARGZ}.sig" VERSION="${VERSION}" node -e 'const fs=require("fs");const sig=fs.readFileSync(process.env.SIG_FILE,"utf8").trim();fs.writeFileSync("latest.json",JSON.stringify({version:process.env.VERSION,pub_date:new Date().toISOString(),platforms:{"darwin-aarch64":{signature:sig,url:"https://api.parley.tw/download/Parley.app.tar.gz"}}},null,2));'
          bunx wrangler r2 object put "parley-recordings/downloads/Parley.app.tar.gz" --file "${TARGZ}" --remote
          bunx wrangler r2 object put "parley-recordings/downloads/Parley.dmg" --file "${DMG}" --remote
          bunx wrangler r2 object put "parley-recordings/downloads/latest.json" --file latest.json --remote
